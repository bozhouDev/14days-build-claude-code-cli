name: Build & Deploy agent-code-learn

on:
  push:
    branches: [main]
    paths:
      - 'agent-code-learn/**'
      - '.github/workflows/build-and-deploy.yml'
  workflow_dispatch:

concurrency:
  group: build-deploy-agent-code-learn
  cancel-in-progress: true

jobs:
  build:
    # 私有仓库（同名工作流也会被同步过来）不应触发真实构建；只在公开仓里跑。
    if: github.repository == 'bozhouDev/14days-build-claude-code-cli'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/agent-code-learn
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build & push image
        uses: docker/build-push-action@v5
        with:
          context: ./agent-code-learn
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Dokploy redeploy
        if: success()
        env:
          DOKPLOY_WEBHOOK_URL: ${{ secrets.DOKPLOY_WEBHOOK_URL }}
        run: |
          if [ -z "$DOKPLOY_WEBHOOK_URL" ]; then
            echo "DOKPLOY_WEBHOOK_URL secret not set; image was pushed, skipping redeploy trigger."
            exit 0
          fi
          curl -fsSL -X POST "$DOKPLOY_WEBHOOK_URL"
