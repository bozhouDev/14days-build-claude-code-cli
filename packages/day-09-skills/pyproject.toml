[project]
name = "agent-code"
version = "0.1.0"
description = "A tiny educational coding agent CLI."
requires-python = ">=3.10"
dependencies = [
  "anthropic>=0.103.1",
  "html2text>=2025.4.15",
  "httpx[socks]>=0.28.1",
  "openai>=2.37.0",
  "pathspec>=1.1.1",
  "prompt-toolkit>=3.0.52",
  "rich>=13.7.0",
  "typer>=0.12.0",
]

[project.scripts]
agent-code = "agent_code.cli:main"

[dependency-groups]
dev = [
  "pytest>=8.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["agent_code"]
